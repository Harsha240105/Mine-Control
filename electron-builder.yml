appId: com.minecontrol.os
productName: MineControl OS
copyright: Copyright © 2026 MineControl OS
directories:
  output: dist/release
  buildResources: build
files:
  - dist/**/*
  - package.json
  - node_modules/**/*
asarUnpack:
  - "node_modules/better-sqlite3/**"
  - "**/*.node"
extraResources:
  - from: public
    to: public
    filter:
      - "**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: MineControl OS
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-${arch}.${ext}
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Game
  artifactName: ${productName}-${version}-${arch}.${ext}
publish:
  provider: github
  owner: Harsha240105
  repo: Mine-Control
